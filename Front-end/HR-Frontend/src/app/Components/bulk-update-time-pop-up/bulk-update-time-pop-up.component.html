<div class="bg-[#dddddd5e] w-full fixed inset-0 py-5 z-50 flex items-center justify-center">
    <div class="relative p-5 md:px-10 m-auto w-[90%] md:w-1/2 lg:w-1/3 rounded-2xl shadow-2xl text-[#111827] bg-white overflow-auto max-h-[95vh]">
        <p class="text-xl md:text-2xl font-bold mb-6 text-center">Bulk Update Employee Times</p>

        <div class="space-y-4">
            <!-- Department Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                <select [(ngModel)]="selectedDepartmentId" (change)="onDepartmentChange()" 
                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-[#FF7519] focus:border-[#FF7519] outline-none">
                    <option [value]="null">Select Department</option>
                    <option *ngFor="let dept of departments" [value]="dept.id">{{ dept.name }}</option>
                </select>
            </div>

            <!-- Sub-department Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Sub-department (Optional)</label>
                <select [(ngModel)]="selectedSubDepartmentId" [disabled]="!selectedDepartmentId"
                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-[#FF7519] focus:border-[#FF7519] outline-none disabled:bg-gray-100">
                    <option [value]="null">Select Sub-department</option>
                    <option *ngFor="let sub of subDepartments" [value]="sub.id">{{ sub.name }}</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Start Time -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Time</label>
                    <input type="time" [(ngModel)]="startTime"
                        class="w-full p-2 border border-gray-300 rounded-lg focus:ring-[#FF7519] focus:border-[#FF7519] outline-none">
                </div>

                <!-- End Time -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">End Time</label>
                    <input type="time" [(ngModel)]="endTime"
                        class="w-full p-2 border border-gray-300 rounded-lg focus:ring-[#FF7519] focus:border-[#FF7519] outline-none">
                </div>
            </div>

            <!-- Working Hours Per Day -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Working Hours Per Day</label>
                <input type="number" [(ngModel)]="workingHoursPerDay" placeholder="e.g. 8"
                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-[#FF7519] focus:border-[#FF7519] outline-none">
            </div>
        </div>

        <div class="flex justify-center mt-8 space-x-4">
            <button (click)="closeDialog()" 
                class="px-6 py-2 border border-gray-300 rounded-xl font-semibold text-gray-600 hover:bg-gray-50 transition-colors">
                Cancel
            </button>
            <button (click)="updateTimes()" [disabled]="isSubmitting"
                class="px-6 py-2 bg-[#FF7519] text-white rounded-xl font-semibold hover:bg-[#e66917] disabled:bg-gray-400 transition-colors flex items-center">
                <span *ngIf="!isSubmitting">Update</span>
                <span *ngIf="isSubmitting" class="flex items-center">
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Processing...
                </span>
            </button>
        </div>
    </div>
</div>
