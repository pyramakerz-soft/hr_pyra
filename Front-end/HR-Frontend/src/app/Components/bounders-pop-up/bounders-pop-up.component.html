<div class="modal-overlay">
    <div class="modal-card">
        <!-- Modal Header -->
        <header class="modal-header">
            <div class="header-title">
                <div class="icon-box">
                    <i class="fa-solid fa-map-location-dot text-lg"></i>
                </div>
                <h2>{{ mode === 'edit' ? 'Modify' : 'Define New' }} Boundary</h2>
            </div>
            <button class="close-btn" (click)="closeDialog()" title="Close Dialog">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </header>

        <!-- Modal Body -->
        <main class="modal-body">
            <div class="form-section">
                <!-- Location Name -->
                <div class="input-group">
                    <label class="label-text">Place Identity</label>
                    <input [(ngModel)]="Boundname" (input)="onNameChange()" placeholder="e.g. Headquarters North" maxlength="50" class="premium-input">
                    <span *ngIf="nameError" class="error-text">{{ nameError }}</span>
                </div>

                <!-- Address -->
                <div class="input-group">
                    <label class="label-text">Street Address</label>
                    <input [(ngModel)]="address" (input)="onAddressChange()" id="autocomplete" placeholder="Enter physical location..." class="premium-input">
                    <span *ngIf="addressError" class="error-text">{{ addressError }}</span>
                </div>

                <!-- Coordinates Grid -->
                <div class="grid-cols-2">
                    <div class="input-group">
                        <label class="label-text">Latitude</label>
                        <input [(ngModel)]="lat" type="text" (input)="filterNumericInput($event)" (ngModelChange)="onLatChange()" placeholder="e.g. 30.0444" class="premium-input">
                        <span *ngIf="LatError" class="error-text">{{ LatError }}</span>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Longitude</label>
                        <input [(ngModel)]="long" type="text" (input)="filterNumericInput($event)" (ngModelChange)="onLongChange()" placeholder="e.g. 31.2357" class="premium-input">
                        <span *ngIf="LongError" class="error-text">{{ LongError }}</span>
                    </div>
                </div>

                <!-- Time window Grid -->
                <div class="grid-cols-2">
                    <div class="input-group">
                        <label class="label-text">Operational Start</label>
                        <input [(ngModel)]="StartTime" type="time" (input)="onStartTimeChange()" class="premium-input">
                        <span *ngIf="StartTimeError" class="error-text">{{ StartTimeError }}</span>
                    </div>
                    <div class="input-group">
                        <label class="label-text">Operational End</label>
                        <input [(ngModel)]="EndTime" type="time" (input)="onEndTimeChange()" class="premium-input">
                        <span *ngIf="EndTimeError" class="error-text">{{ EndTimeError }}</span>
                    </div>
                </div>

                <!-- Operational Radius -->
                <div class="input-group">
                    <label class="label-text">Geofence Radius (Meters)</label>
                    <div class="relative">
                        <input [(ngModel)]="radius" type="text" (input)="filterNumericInput($event)" (ngModelChange)="onRadiusChange()" placeholder="e.g. 500" class="premium-input w-full pr-12">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-xs">M</span>
                    </div>
                    <span *ngIf="radiusError" class="error-text">{{ radiusError }}</span>
                </div>

                <!-- School Visit Toggle -->
                <div class="input-group mt-2">
                    <div class="flex items-center gap-3 py-3 bg-gray-50 rounded-xl px-4 border border-gray-100">
                        <div class="form-check form-switch mb-0 flex items-center">
                            <input class="form-check-input h-6 w-11 cursor-pointer" type="checkbox" [(ngModel)]="isSchool" id="isSchoolSwitch">
                            <label class="form-check-label text-sm font-bold text-gray-600 ml-3 cursor-pointer" for="isSchoolSwitch">
                                Mark as School Visit
                            </label>
                        </div>
                        <i class="fa-solid fa-graduation-cap text-gray-300 ml-auto text-lg" title="When enabled, visits to this location will be counted as school visits in reports."></i>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal Footer -->
        <footer class="modal-footer">
            <button class="btn-primary" (click)="EditAndAddLocation()">
                <i class="fa-solid fa-check mr-2"></i>
                Save Location
            </button>
        </footer>
    </div>
</div>
