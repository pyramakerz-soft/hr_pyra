<div class="page-container pb-20">
  <!-- Header & Global Actions -->
  <header class="header-nav">
    <div class="hero-title">
      <button (click)="goBack()" class="back-btn" title="Back to Roles">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h1 class="page-title">{{ RoleName ? 'Modify Role' : 'Define New Role' }}</h1>
    </div>
    
    <div class="flex gap-3">
      <button class="btn-premium btn-outline" (click)="cancel()">Cancel</button>
      <button class="btn-premium btn-primary" (click)="save()" [disabled]="isSaving">
        <i class="fa-solid fa-floppy-disk mr-2"></i>
        Save Changes
      </button>
    </div>
  </header>

  <!-- Role Definition Card -->
  <main class="form-card">
    <!-- Role Name Input -->
    <div class="input-group">
      <label for="role" class="label-text">
        Role Descriptor
        <span *ngIf="RoleNameError" class="error-text ml-2">{{ RoleNameError }}</span>
      </label>
      <input id="role" type="text" class="premium-input" placeholder="e.g. Operations Manager" 
             [(ngModel)]="RoleName" maxlength="50" (input)="onRoleChange()">
      <p class="text-[10px] text-gray-400 mt-1 italic">The descriptive name as it will appear in the system hierarchy.</p>
    </div>

    <!-- Permissions Multi-Select -->
    <div class="input-group">
      <label class="label-text">
        System Privileges
        <span *ngIf="namesArrayError" class="error-text ml-2">{{ namesArrayError }}</span>
      </label>
      
      <div class="relative">
        <!-- Selector Box -->
        <div class="permission-selector" (click)="toggleDropdown()">
          <div class="selected-chips" *ngIf="permissions.length > 0">
            <ng-container *ngFor="let permission of permissions">
                <span *ngIf="permission.selected" class="permission-chip">
                    {{ permission.name }}
                </span>
            </ng-container>
            <span *ngIf="!RoleName && !hasSelectedPermissions" class="text-gray-400">Select required permissions...</span>
          </div>
          <i class="fa-solid fa-chevron-down text-gray-400"></i>
        </div>

        <!-- Dropdown Menu -->
        <div *ngIf="isDropdownOpen" class="permission-dropdown absolute w-full mt-2">
          <div *ngIf="permissions.length > 0; else noData">
            <div *ngFor="let permission of permissions" 
                 class="multi-option" 
                 [class.option-checked]="permission.selected"
                 (click)="$event.stopPropagation(); permission.selected = !permission.selected; onArrayChange()">
              <div class="custom-checkbox">
                <i class="fa-solid fa-check"></i>
              </div>
              <span class="option-text">{{ permission.name }}</span>
            </div>
          </div>
          <ng-template #noData>
            <div class="p-4 text-center text-gray-400 italic">No privileges available to assign.</div>
          </ng-template>
        </div>
      </div>
      <p class="text-[10px] text-gray-400 mt-1">Assign critical functional access points to this role definition.</p>
    </div>
  </main>
</div>
