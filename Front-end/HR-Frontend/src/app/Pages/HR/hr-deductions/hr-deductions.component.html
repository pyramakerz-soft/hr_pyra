<div class="page-container">
    <!-- Header -->
    <header class="deduction-header">
        <div>
            <h1 class="page-title"> Attendance Deductions</h1>
            <p class="page-subtitle">Manage penalty rules for late arrivals and missing working hours</p>
        </div>
        <div class="header-actions">
            <button class="btn-premium btn-primary" (click)="savePlan()" [disabled]="!selectedId">
                <i class="fa-solid fa-save"></i>
                <span>Save Settings</span>
            </button>
        </div>
    </header>

    <!-- Context Selection -->
    <section class="selection-card">
        <div class="filter-grid">
            <div class="filter-group">
                <label class="filter-label">Apply To</label>
                <select class="premium-select" [(ngModel)]="selectedType" (change)="onTypeChange()">
                    <option value="department">Department</option>
                    <option value="sub-department">Sub-Department</option>
                </select>
            </div>

            <ng-container *ngIf="selectedType === 'sub-department'">
                <div class="filter-group">
                    <label class="filter-label">Select Department</label>
                    <select class="premium-select" #deptSelect (change)="onDepartmentForSubChange(deptSelect.value)">
                        <option value="" selected disabled>Choose Department</option>
                        <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
                    </select>
                </div>
            </ng-container>

            <!-- Template Selector -->
            <div class="filter-group">
                <label class="filter-label">Use Seeded Template</label>
                <select class="premium-select" [(ngModel)]="selectedTemplate" (change)="applyTemplate(selectedTemplate)">
                    <option [ngValue]="null" selected disabled>Pick a Template...</option>
                    <option *ngFor="let t of templates" [ngValue]="t">{{ t.name }}</option>
                </select>
            </div>

            <div class="filter-group" [class.col-span-2]="selectedType === 'department'">
                <label class="filter-label">Select {{ selectedType === 'department' ? 'Department' : 'Sub-Department' }}</label>
                <select class="premium-select" [(ngModel)]="selectedId" (change)="loadPlan()">
                    <option [ngValue]="null" disabled>Choose Target...</option>
                    <ng-container *ngIf="selectedType === 'department'">
                        <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
                    </ng-container>
                    <ng-container *ngIf="selectedType === 'sub-department'">
                        <option *ngFor="let s of subDepartments" [value]="s.id">{{ s.name }}</option>
                    </ng-container>
                </select>
            </div>

            <div class="filter-group" *ngIf="selectedId">
                <label class="filter-label">Allowed Late Minutes</label>
                <input type="number" class="premium-input" [(ngModel)]="plan.grace_minutes" placeholder="0">
            </div>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-50 flex items-center justify-between" *ngIf="selectedId">
            <div class="switch-group">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" [(ngModel)]="plan.overwrite" id="overwriteSwitch">
                    <label class="form-check-label text-sm font-bold text-gray-600 cursor-pointer" for="overwriteSwitch">
                        Ignore Global Department Rules
                    </label>
                </div>
                <i class="fa-solid fa-circle-info text-gray-300" title="When enabled, this plan will only use the rules defined here."></i>
            </div>
        </div>
    </section>

    <!-- Rules Configuration -->
    <div *ngIf="selectedId" class="rules-container">
        <div *ngIf="plan.rules.length === 0" class="empty-state">
            <i class="fa-solid fa-list-check empty-icon"></i>
            <p class="empty-text">No rules set for this selection yet.</p>
            <button class="btn-premium btn-secondary mt-4" (click)="addRule()">
                <i class="fa-solid fa-plus"></i>
                <span>Create First Rule</span>
            </button>
        </div>

        <div *ngFor="let rule of plan.rules; let i = index" class="rule-card shadow-sm">
            <div class="rule-card-header">
                <div class="rule-label-container">
                    <span class="rule-number">Rule #{{ i + 1 }}</span>
                    <input type="text" class="premium-input rule-label-input !border-0 !py-0 !px-1 font-bold !text-lg bg-transparent focus:!ring-0" 
                           [(ngModel)]="rule.label" placeholder="Name this rule (e.g. Late Arrival Policy)...">
                </div>
                <button class="btn-danger btn-premium !p-2 !rounded-lg" (click)="removeRule(i)" title="Remove Rule">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="filter-group">
                    <label class="filter-label">Apply if employee is:</label>
                    <select class="premium-select" [(ngModel)]="rule.category">
                        <option value="late_arrival">Late Arriving</option>
                        <option value="early_leave">Leaving Early</option>
                        <option value="shortfall">Missing Hours (Shortfall)</option>
                        <option value="other">Other Violation</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">How to deduct?</label>
                    <select class="premium-select" [(ngModel)]="rule.penalty.type">
                        <option value="fixed_minutes">Specific Minutes</option>
                        <option value="fixed_hours">Specific Hours</option>
                        <option value="fraction_day">Half/Full Day (e.g. 0.5)</option>
                        <option value="metric_minutes">Exact Metric (Lateness or Shortfall)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Deduction Amount</label>
                    <div class="relative">
                        <input type="number" step="0.01" class="premium-input" [(ngModel)]="rule.penalty.value">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 font-bold text-xs uppercase">
                            {{ rule.penalty.type === 'fraction_day' ? 'Days' : 'Units' }}
                        </span>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Settings</label>
                    <div class="switch-group py-2">
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" [(ngModel)]="rule.stop_processing" [id]="'stopProcess' + i">
                            <label class="form-check-label text-xs font-bold text-gray-500" [for]="'stopProcess' + i">
                                Stop evaluating further rules
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Conditions (When) -->
            <div class="mt-4 p-3 bg-gray-50 rounded-3 border border-gray-100">
                <label class="filter-label mb-3 d-block"><i class="fa-solid fa-clock me-2"></i> Conditions (Apply this rule if...)</label>
                <div class="row g-3">
                    <div class="col-md-3" *ngIf="rule.category === 'late_arrival'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Arriving after...</label>
                        <input type="time" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['late_arrival_after']">
                    </div>
                    <div class="col-md-3" *ngIf="rule.category === 'late_arrival'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Arriving before...</label>
                        <input type="time" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['late_arrival_before']">
                    </div>
                    <div class="col-md-3" *ngIf="rule.category === 'shortfall'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Shortfall more than (Min)</label>
                        <input type="number" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['shortfall_minutes_gt']">
                    </div>
                    <div class="col-md-3" *ngIf="rule.category === 'shortfall'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Shortfall at least (Min)</label>
                        <input type="number" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['shortfall_minutes_gte']">
                    </div>
                    <div class="col-md-3" *ngIf="rule.category === 'shortfall'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Shortfall less than (Min)</label>
                        <input type="number" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['shortfall_minutes_lt']">
                    </div>
                    <div class="col-md-3" *ngIf="rule.category === 'shortfall'">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Shortfall at most (Min)</label>
                        <input type="number" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.when['shortfall_minutes_lte']">
                    </div>
                    <div class="col-md-6">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Rule Description</label>
                        <input type="text" class="premium-input !py-1 !text-sm" [(ngModel)]="rule.notes" placeholder="e.g. Penalty for arriving very late">
                    </div>
                </div>
            </div>
        </div>

        <button *ngIf="plan.rules.length > 0" class="btn-premium btn-outline" (click)="addRule()">
            <i class="fa-solid fa-plus-circle me-2"></i>
            <span>Add New Rule</span>
        </button>
    </div>

    <!-- No Selection State -->
    <div *ngIf="!selectedId" class="empty-state">
        <i class="fa-solid fa-sitemap empty-icon"></i>
        <p class="empty-text text-lg">Select a Department or Sub-Department to view and edit rules.</p>
    </div>
</div>
