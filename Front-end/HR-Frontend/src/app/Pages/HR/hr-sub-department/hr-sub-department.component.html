<div class="page-container pb-10">
  <!-- Page Header -->
  <header class="page-header">
    <div class="hero-title">
      <button (click)="goBack()" class="back-btn" title="Back to Departments">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h1 class="page-title">Sub-Departments</h1>
    </div>
    
    <button (click)="NavigateToAddSubDepartment()" [disabled]="AddButton" class="btn-add">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Sub-Department</span>
    </button>
  </header>

  <!-- Sub-Department List Card -->
  <div class="table-card">
    <div class="overflow-x-auto">
      <table class="modern-table">
        <thead>
          <tr>
            <th class="w-20">UID</th>
            <th>Functional Identity</th>
            <th>Designated Team Lead</th>
            <th class="text-right px-6" *ngIf="subDepts.length !== 0">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty State -->
          <tr *ngIf="subDepts.length === 0">
            <td colspan="4">
              <div class="empty-state">
                <i class="fa-solid fa-sitemap"></i>
                <p class="font-medium">No sub-departments established</p>
                <p class="text-xs mt-1">Refine your organizational hierarchy here</p>
              </div>
            </td>
          </tr>

          <!-- Data Rows -->
          <tr *ngFor="let row of subDepts; let i = index">
            <td class="id-text">#{{ row.id }}</td>
            <td class="dept-name">{{ row.name }}</td>
            <td>
              <div class="lead-badge" *ngIf="row.teamLeadName">
                <i class="fa-solid fa-user-gear text-[10px] opacity-50"></i>
                {{ row.teamLeadName }}
              </div>
              <span *ngIf="!row.teamLeadName" class="text-gray-300 italic text-xs">Unassigned</span>
            </td>
            
            <td class="text-right px-6" *ngIf="subDepts.length !== 0">
              <div class="flex justify-end gap-2">
                <button [disabled]="AddButton" class="action-btn edit-btn" title="Modify Sub-Department"
                        (click)="EditSubDepartment(row.id)">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="action-btn delete-btn" title="Remove Sub-Department" 
                        (click)="deleteSubDepartment(row.id)">
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
