<div class="page-container pb-20">
  <!-- Header & Controls -->
  <header class="header-nav">
    <div class="hero-title">
      <button (click)="goBack()" class="back-btn" title="Back to Sub-Departments">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h1 class="page-title">{{ DeptName ? 'Modify Sub-Department' : 'Define Sub-Department' }}</h1>
    </div>
    
    <div class="flex gap-3">
      <button class="btn-premium btn-outline" (click)="cancel()">Cancel</button>
      <button class="btn-premium btn-primary" (click)="Save()" [disabled]="SaveButton">
        <i class="fa-solid fa-floppy-disk mr-2"></i>
        Save Unit
      </button>
    </div>
  </header>

  <!-- Sub-Department Definition Card -->
  <main class="form-card mx-auto">
    <section>
      <!-- Sub-Department Name -->
      <div class="input-group">
        <label for="subDeptName" class="label-text">
          Functional Unit Identity
          <span *ngIf="DeptNameError" class="error-text ml-2">{{ DeptNameError }}</span>
        </label>
        <input id="subDeptName" type="text" [(ngModel)]="DeptName" placeholder="e.g. Quality Assurance" 
               maxlength="50" class="premium-input">
      </div>

      <!-- Team Lead Selection -->
      <div class="input-group">
        <label class="label-text">
          Designated Team Leader
          <span *ngIf="TeamLeadError" class="error-text ml-2">{{ TeamLeadError }}</span>
        </label>
        
        <div class="premium-checkbox-group mb-3" [class.checked]="useDepartmentManager" (click)="useDepartmentManager = !useDepartmentManager">
          <div class="custom-check">
            <i class="fa-solid fa-check"></i>
          </div>
          <div class="flex flex-col">
            <span class="text-sm font-bold">Assign Department Manager as Team Leader</span>
            <span class="text-[10px] text-gray-400 italic">This will use the parent Department's Manager</span>
          </div>
        </div>

        <div class="relative" *ngIf="!useDepartmentManager">
          <div class="lead-selector" (click)="toggleDropdown()">
            <span [class.text-gray-400]="!nameSelected">{{ nameSelected || 'Assign a lead...' }}</span>
            <i class="fa-solid fa-chevron-down text-gray-400"></i>
          </div>

          <!-- Lead Dropdown -->
          <div *ngIf="isDropdownOpen" class="dropdown-menu">
            <ng-container *ngIf="TeamLeadNames.length !== 0; else noLeads">
              <div *ngFor="let teamLead of TeamLeadNames" 
                   class="lead-option" 
                   [class.option-checked]="nameSelected === teamLead.team_lead_name"
                   (click)="selectTeamLead(teamLead)">
                <div class="option-radio"></div>
                <span class="text-sm font-medium">{{ teamLead.team_lead_name }}</span>
              </div>
            </ng-container>
            <ng-template #noLeads>
              <div class="p-4 text-center text-gray-400 italic">No eligible leads found.</div>
            </ng-template>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Deduction Plan (Commented as requested) -->
  <!-- <div class="..."> ... </div> -->
</div>
