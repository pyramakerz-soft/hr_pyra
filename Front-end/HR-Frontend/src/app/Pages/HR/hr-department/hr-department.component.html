<div class="page-container pb-10">
  <!-- Page Header -->
  <header class="page-header">
    <h1 class="page-title">Departments</h1>
    
    <button (click)="NavigateToAddDepartment()" [disabled]="AddButton" class="btn-add">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Department</span>
    </button>
  </header>

  <!-- Department List Card -->
  <div class="table-card">
    <div class="overflow-x-auto">
      <table class="modern-table">
        <thead>
          <tr>
            <th class="w-16">#</th>
            <th>Department Identity</th>
            <th>Supervising Manager</th>
            <th>Location Protocols</th>
            <th class="text-right px-6" *ngIf="departments.length !== 0">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty State -->
          <tr *ngIf="departments.length === 0">
            <td colspan="5">
              <div class="empty-state">
                <i class="fa-solid fa-building-user"></i>
                <p class="font-medium">No departments defined yet</p>
                <p class="text-xs mt-1">Establish your organizational structure here</p>
              </div>
            </td>
          </tr>

          <!-- Data Rows -->
          <tr *ngFor="let row of departments; let i = index">
            <td class="text-xs font-mono text-gray-400">{{ i + 1 }}</td>
            <td class="dept-name">{{ row.name }}</td>
            <td>
              <div class="manager-badge" *ngIf="row.manager_name">
                <i class="fa-solid fa-user-tie text-[10px] opacity-50"></i>
                {{ row.manager_name }}
              </div>
              <span *ngIf="!row.manager_name" class="text-gray-300 italic text-xs">Unassigned</span>
            </td>
            <td>
              <div class="status-indicator" [class.status-active]="row.is_location_time" [class.status-inactive]="!row.is_location_time">
                <span class="status-dot"></span>
                <span>{{ row.is_location_time ? 'Location Time Active' : 'Standard Protocols' }}</span>
              </div>
            </td>
            
            <td class="text-right px-6" *ngIf="departments.length !== 0">
              <div class="flex justify-end gap-2">
                <button [disabled]="AddButton" class="action-btn view-btn" title="View Sub-Departments"
                        (click)="navigateToSubDept(row.id)">
                  <i class="fas fa-eye"></i>
                </button>
                <button [disabled]="AddButton" class="action-btn edit-btn" title="Modify Department"
                        (click)="EditDepartment(row.id)">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="action-btn delete-btn" title="Remove Department" 
                        (click)="deleteDepartment(row.id)">
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
