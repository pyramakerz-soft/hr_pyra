<div class="page-container pb-10">
  <!-- Page Header -->
  <header class="page-header">
    <h1 class="page-title">Timezone Configurations</h1>
    
    <button (click)="addTimezone()" class="btn-add">
      <i class="fa-solid fa-plus"></i>
      <span>Define New Timezone</span>
    </button>
  </header>

  <!-- Timezone List Card -->
  <div class="table-card">
    <div class="overflow-x-auto">
      <table class="modern-table">
        <thead>
          <tr>
            <th class="w-16">#</th>
            <th>Temporal Identity</th>
            <th>Offset Value</th>
            <th class="text-right px-6" *ngIf="timezones.length !== 0">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty State -->
          <tr *ngIf="timezones.length === 0">
            <td colspan="4">
              <div class="empty-state">
                <i class="fa-solid fa-earth-americas"></i>
                <p class="font-medium">No timezones configured</p>
                <p class="text-xs mt-1">Sync your global operations here</p>
              </div>
            </td>
          </tr>

          <!-- Data Rows -->
          <tr *ngFor="let timezone of timezones; let i = index">
            <td class="index-text">{{ i + 1 }}</td>
            <td class="timezone-name">{{ timezone.name }}</td>
            <td>
              <div class="value-pill" *ngIf="timezone.value !== null && timezone.value !== undefined">
                <i class="fa-regular fa-clock text-[10px] opacity-50"></i>
                UTC {{ timezone.value.toString().startsWith('+') || timezone.value.toString().startsWith('-') ? timezone.value : '+' + timezone.value }}
              </div>
            </td>
            
            <td class="text-right px-6" *ngIf="timezones.length !== 0">
              <div class="flex justify-end gap-2">
                <button class="action-btn edit-btn" title="Modify Timezone"
                        (click)="editTimezone(timezone.id!)">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="action-btn delete-btn" title="Remove Timezone" 
                        (click)="deleteTimezone(timezone.id!)">
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
