<div class="page-container pb-20">
  <!-- Header & Controls -->
  <header class="header-nav">
    <div class="hero-title">
      <button (click)="goBack()" class="back-btn" title="Back to Timezones">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h1 class="page-title">{{ isEditMode ? 'Modify Timezone' : 'Define Timezone' }}</h1>
    </div>
    
    <div class="flex gap-3">
      <button class="btn-premium btn-primary" (click)="onSubmit()" [disabled]="isSaved">
        <div *ngIf="isSaved" class="loader"></div>
        <i *ngIf="!isSaved" class="fa-solid fa-floppy-disk"></i>
        <span>{{ isEditMode ? 'Update Configuration' : 'Save Configuration' }}</span>
      </button>
    </div>
  </header>

  <!-- Timezone Definition Card -->
  <main class="form-card">
    <h2 class="section-title">
      <i class="fa-solid fa-clock"></i>
      Temporal Information
    </h2>
    
    <form #timezoneForm="ngForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8">
        <!-- Name Field -->
        <div class="input-group">
          <label class="label-text">
            Timezone Identity
            <span *ngIf="validationErrors['name']" class="error-text ml-2">{{ validationErrors['name'] }}</span>
          </label>
          <input 
            [(ngModel)]="timezone.name" 
            (ngModelChange)="onInputValueChange('name', $event)"
            name="name" 
            type="text" 
            class="premium-input" 
            placeholder="e.g. Egypt Standard Time">
        </div>

        <!-- Value Field -->
        <div class="input-group">
          <label class="label-text">
            Offset Value (UTC)
            <span *ngIf="validationErrors['value']" class="error-text ml-2">{{ validationErrors['value'] }}</span>
          </label>
          <input 
            [(ngModel)]="timezone.value" 
            (ngModelChange)="onInputValueChange('value', $event)"
            name="value" 
            type="text" 
            class="premium-input" 
            placeholder="e.g. +2, -5">
          <p class="text-[10px] text-gray-400 italic mt-1">Specify the hourly offset from Universal Coordinated Time.</p>
        </div>
      </div>
    </form>
  </main>
</div>
