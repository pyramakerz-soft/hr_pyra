<div (click)="resetfilteredUsers()" class="page-container">
  <!-- Page Header -->
  <header class="flex flex-col md:flex-row justify-between md:items-center gap-4 page-header">
    <h1 class="title-text">Employees</h1>
    
    <div class="action-buttons">
      <button (click)="downloadExcelTemplate()" [disabled]="isLoading" class="btn-premium btn-outline">
        <div *ngIf="isLoading" class="spinner"></div>
        <i *ngIf="!isLoading" class="fa-solid fa-download"></i>
        <span>Download Template</span>
      </button>

      <button (click)="OpenBulkUpdateTimePopUp()" class="btn-premium btn-orange-outline">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>Bulk Update</span>
      </button>

      <button (click)="NavigateToAddEmployee()" class="btn-premium btn-primary">
        <i class="fa-solid fa-plus"></i>
        <span>Add Employee</span>
      </button>
    </div>
  </header>

  <!-- Search & Filter Bar -->
  <div class="search-container">
    <i class="fa-solid fa-magnifying-glass text-[#667085]"></i>
    <input 
      type="text" 
      [(ngModel)]="selectedName" 
      (input)="filterByName()" 
      (keydown.enter)="Search()"
      placeholder="Search by name or department..."
      class="search-input" />

    <!-- Search Suggestions Dropdown -->
    <div *ngIf="filteredUsers.length > 0"
      class="absolute top-full left-0 w-full bg-white border border-gray-100 rounded-xl shadow-2xl z-20 mt-2 max-h-60 overflow-y-auto py-2">
      <ul>
        <li *ngFor="let user of filteredUsers" (click)="selectUser(user)"
          class="px-5 py-3 cursor-pointer hover:bg-gray-50 flex items-center justify-between group">
          <span class="font-medium text-[#17253E]">{{ user }}</span>
          <i class="fa-solid fa-arrow-right text-transparent group-hover:text-gray-300 transform group-hover:translate-x-1 transition-all"></i>
        </li>
      </ul>
    </div>
  </div>

  <!-- Data Table Section -->
  <div class="table-card">
    <div class="overflow-x-auto">
      <table class="premium-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Code</th>
            <th>Role</th>
            <th>Department</th>
            <th>Phone</th>
            <th class="hidden xl:table-cell">Email</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- No Data View -->
          <tr *ngIf="tableData.length === 0">
            <td colspan="8" class="text-center py-20">
              <div class="flex flex-col items-center text-gray-400">
                <i class="fa-solid fa-users-slash text-4xl mb-3"></i>
                <p>No employees found matching your criteria</p>
              </div>
            </td>
          </tr>

          <!-- Employee Rows -->
          <tr *ngFor="let row of tableData; let i = index">
            <td class="font-medium text-[#667085]">{{ (CurrentPageNumber - 1) * 5 + i + 1 }}</td>
            <td class="font-bold">
              <button (click)="NavigateToEmployeeDetails(row.id)" class="hover:text-[#437EF7] transition-colors">
                {{ row.name }}
              </button>
            </td>
            <td><code class="bg-gray-50 px-2 py-1 rounded text-xs font-mono">{{ row.code }}</code></td>
            <td>{{ row.role }}</td>
            <td>
              <span class="dept-badge" [ngClass]="{
                'dept-software': row.department === 'Software',
                'dept-academic': row.department === 'Academic',
                'dept-default': row.department !== 'Software' && row.department !== 'Academic'
              }">
                {{ row.department ? row.department : 'Unassigned' }}
              </span>
            </td>
            <td class="text-xs">{{ row.phone }}</td>
            <td class="hidden xl:table-cell text-xs opacity-75">{{ row.email }}</td>
            <td>
              <div class="flex gap-1">
                <button (click)="openHrProfileDialog(row.id)" class="action-icon icon-profile" title="HR Profile">
                  <i class="fa-solid fa-id-card"></i>
                </button>
                <button (click)="NavigateToEditEmployee(row.id)" class="action-icon icon-edit" title="Edit">
                  <i class="fa-solid fa-pen-to-square"></i>
                </button>
                <button (click)="DeleteEmp(row.id)" class="action-icon icon-delete" title="Delete">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Pagination Controls -->
  <div class="pagination-container" *ngIf="DisplayPagginationOrNot && PagesNumber > 1">
    <button class="btn-nav" [disabled]="CurrentPageNumber === 1" (click)="getPrevPage()">
      <i class="fa-solid fa-chevron-left"></i>
      <span>Previous</span>
    </button>

    <div class="flex items-center gap-2">
      <!-- Logic to show limited page numbers if needed, but keeping current binding -->
      <button *ngIf="CurrentPageNumber > 1" class="page-link" (click)="getAllEmployees(CurrentPageNumber - 1)">
        {{ CurrentPageNumber - 1 }}
      </button>
      
      <button class="page-link active">
        {{ CurrentPageNumber }}
      </button>

      <span *ngIf="CurrentPageNumber < PagesNumber - 1" class="text-gray-300">...</span>

      <button *ngIf="CurrentPageNumber < PagesNumber" class="page-link" (click)="getAllEmployees(PagesNumber)">
        {{ PagesNumber }}
      </button>
    </div>

    <button class="btn-nav" [disabled]="CurrentPageNumber === PagesNumber" (click)="getNextPage()">
      <span>Next</span>
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
