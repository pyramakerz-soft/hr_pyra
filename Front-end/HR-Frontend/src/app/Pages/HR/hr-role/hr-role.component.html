<div class="page-container pb-10">
  <!-- Page Header -->
  <header class="page-header">
    <h1 class="page-title">Access Roles</h1>
    
    <button (click)="NavigateToAddRole()" [disabled]="isNavigatingToaddRole" class="btn-add">
      <i class="fa-solid fa-plus"></i>
      <span>Create New Role</span>
    </button>
  </header>

  <!-- Role List Card -->
  <div class="table-card">
    <div class="overflow-x-auto">
      <table class="modern-table">
        <thead>
          <tr>
            <th>Role Descriptor</th>
            <th>Assigned Privileges</th>
            <th class="text-right px-6" *ngIf="tableData.length !== 0">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Empty State -->
          <tr *ngIf="tableData.length === 0">
            <td colspan="3">
              <div class="empty-state">
                <i class="fa-solid fa-shield-halved"></i>
                <p class="font-medium">No roles defined yet</p>
                <p class="text-xs mt-1">Create a role to manage system permissions</p>
              </div>
            </td>
          </tr>

          <!-- Role Rows -->
          <tr *ngFor="let row of tableData; let i = index">
            <td class="font-bold text-[#17253E]">{{ row.name }}</td>
            <td>
              <div class="flex flex-wrap pt-2">
                <span *ngFor="let permission of row.Permissions" class="permission-badge">
                  {{ permission.name }}
                </span>
              </div>
            </td>
            
            <td class="text-right px-6" *ngIf="tableData.length !== 0">
              <div class="flex justify-end gap-2">
                <button (click)="navigateToEdit(row.id)" 
                        class="action-btn edit-btn" 
                        [class.disabled]="isNavigatingToEditRole"
                        title="Edit Role">
                  <i class="fas fa-edit"></i>
                </button>
                <button (click)="deleteRole(row.id)" 
                        class="action-btn delete-btn" 
                        [class.disabled]="isDeleted"
                        title="Delete Role">
                  <i class="fa fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
