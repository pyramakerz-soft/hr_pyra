<div class="login-wrapper">
  <!-- Form Side -->
  <main class="form-side">
    <!-- Logo -->
    <div class="logo-container">
      <img src="../../../assets/images/Paragraphcontainer.png" alt="Pyramakerz Logo" class="logo-img">
    </div>

    <!-- Greeting -->
    <header class="form-header">
      <h1 class="welcome-text">Welcome Back</h1>
      <p class="subtitle-text">Please sign in to access your HR workspace</p>
    </header>

    <!-- Sign-in Form -->
    <div class="form-container">
      <!-- Email Field -->
      <div class="input-group">
        <label for="email" class="label-text">Institutional Email</label>
        <input id="email" type="email" placeholder="name@company.com" 
               [(ngModel)]="email" (input)="onEmailChange()"
               class="premium-input" autocomplete="email">
        <div class="h-4">
          <span *ngIf="emailError" class="error-text animate-in fade-in slide-in-from-top-1">
            <i class="fa-solid fa-circle-exclamation mr-1"></i> {{ emailError }}
          </span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="input-group">
        <label for="pass" class="label-text">Security Password</label>
        <input id="pass" type="password" placeholder="••••••••" 
               [(ngModel)]="password" (input)="onPasswordChange()"
               class="premium-input" autocomplete="current-password">
        <div class="h-4">
          <span *ngIf="passwordError" class="error-text animate-in fade-in slide-in-from-top-1">
            <i class="fa-solid fa-circle-exclamation mr-1"></i> {{ passwordError }}
          </span>
        </div>
      </div>

      <!-- Submit Button -->
      <button class="btn-signin flex items-center justify-center gap-2" (click)="SignIn()">
        <span>Login</span>
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
      
      <!-- Footer Note (Optional) -->
      <p class="text-[10px] text-center text-gray-400 mt-8 font-bold uppercase tracking-widest">
        Secured by Enterprise Authentication
      </p>
    </div>
  </main>

  <!-- Branding Side -->
  <aside class="branding-side">
    <div class="branding-content">
      <h2 class="slogan">
        Do more <br>
        <span>with Pyramakerz</span>
      </h2>
      
      <div class="hero-image-container">
        <img src="../../../assets/images/Layer 2.png" alt="Strategic HR Management" class="hero-img">
      </div>
    </div>
  </aside>
</div>
